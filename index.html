<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KM Kommandocentral</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--pri:#6366f1;--ok:#10B981;--warn:#F59E0B;--err:#EF4444;--t1:#f1f5f9;--t2:rgba(255,255,255,0.4);--r:10px;--cyan:#22d3ee;--lila:#a78bfa;--gul:#facc15}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;font-size:14px;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--t1);border-radius:8px;padding:10px 12px;width:100%;outline:none;font-size:16px}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
select option{background:#14142a;color:var(--t1)}
label{display:block;color:var(--t2);font-size:12px;margin:10px 0 4px}
::-webkit-scrollbar{height:0;width:0}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700}.header h1 span{color:var(--t2);font-weight:400;font-size:11px;margin-left:5px}
.stats{display:flex;gap:10px;font-size:11px;color:var(--t2)}.stats b{color:var(--t1)}
.tabs{display:flex;gap:3px;padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:var(--bg);overflow-x:auto}
.tab-btn{background:none;border:none;color:var(--t2);padding:7px 11px;border-radius:20px;font-size:12px;transition:.15s;white-space:nowrap;min-height:36px;flex-shrink:0}
.tab-btn.active{background:var(--pri);color:#fff}
.content{padding:12px 12px 20px;max-width:1400px;margin:0 auto}
.tp{display:none}.tp.active{display:block}
.b{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-block;white-space:nowrap}
.b-type{background:rgba(99,102,241,0.1);color:#a5b4fc}
.grp{margin-bottom:16px}
.grp-hdr{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;padding:6px 0;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.grp-hdr .d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grp-hdr .c{font-size:10px;color:var(--t2);background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:6px}
/* PROJECT ROW (shared) */
.prow{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.prow-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.prow-info{min-width:0;flex-shrink:0}
.prow-info h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px}
.prow-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.prio-dots{display:flex;gap:2px}.prio-dots i{width:6px;height:6px;border-radius:50%;background:var(--pri);display:block}.prio-dots i.off{opacity:.12}
.edit-btn{background:none;border:none;color:var(--t2);font-size:11px;padding:4px 6px;border-radius:4px;min-height:28px;min-width:28px;display:flex;align-items:center;justify-content:center}.edit-btn:active{color:var(--t1);background:rgba(255,255,255,0.06)}
.ver{font-size:11px;color:var(--t2)}.prog-text{font-size:10px;color:var(--t2)}
/* HORIZ TIMELINE (Företag/Personligt — scrollable) */
.tl-s{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 12px 6px}
.tl{display:flex;align-items:flex-start;min-width:max-content;gap:0;padding-right:8px}
/* WRAP TIMELINE (Privat — wraps) */
.tl-w{padding:4px 12px 8px}.tl-w .tl{min-width:0;flex-wrap:wrap;gap:3px 0}
.tl-step{display:flex;flex-direction:column;align-items:center}
.tl-node{display:flex;align-items:center}
.dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;transition:.15s;z-index:2;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0}
.dot:active{transform:scale(0.9)}
.dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.dot.act{background:var(--pri);border-color:var(--pri);color:#fff;box-shadow:0 0 8px rgba(99,102,241,0.4);animation:pulse 2s infinite}
.dot.sel{box-shadow:0 0 0 3px rgba(99,102,241,0.25)}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(99,102,241,0.3)}50%{box-shadow:0 0 14px rgba(99,102,241,0.5)}}
.ln{width:14px;height:2px;background:rgba(255,255,255,0.06);flex-shrink:0}
.ln.done-l{background:var(--ok)}.ln.act-l{background:linear-gradient(90deg,var(--ok),var(--pri))}
.lbl{font-size:8px;color:var(--t2);margin-top:3px;text-align:center;white-space:nowrap;max-width:52px;overflow:hidden;text-overflow:ellipsis}
.lbl.done{color:rgba(16,185,129,0.5)}.lbl.act{color:var(--pri);font-weight:600}
.tl-res{height:12px;font-size:9px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tl-dl{font-size:7px;color:var(--t2);margin-top:0}.tl-dl.soon{color:var(--warn)}
.ins{display:flex;align-items:center;flex-shrink:0;align-self:flex-start;padding-top:2px}
.ins-btn{width:28px;height:28px;border-radius:50%;border:1.5px dashed rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.12);font-size:14px;display:flex;align-items:center;justify-content:center}
.ins-btn:active{border-color:var(--pri);color:var(--pri);background:rgba(99,102,241,0.08)}
/* PRIVAT specifics */
.tier{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600}
.t1{background:rgba(6,182,212,0.12);color:var(--cyan)}.t2{background:rgba(139,92,246,0.12);color:var(--lila)}.t3{background:rgba(234,179,8,0.12);color:var(--gul)}
.prog-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:0 12px 6px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.chev{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.3);flex-shrink:0}
.chev.open{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);color:var(--pri)}
.priv-head{display:flex;align-items:flex-start;gap:10px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.priv-head-c{flex:1;min-width:0}
.priv-head h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.priv-row2{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.priv-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.priv-right{display:flex;align-items:center;gap:8px}
.budget{font-size:10px;color:var(--t2)}.budget b{color:var(--ok)}
.dl-tag{font-size:10px;color:var(--t2)}.dl-tag.soon{color:var(--warn)}.dl-tag.over{color:var(--err)}.dl-tag.ok{color:var(--ok)}
.arch-grp{opacity:.3}.arch-grp .prow{border-style:dashed}
/* STEP PANEL */
.step-panel{background:rgba(255,255,255,0.02);border-top:1px solid rgba(255,255,255,0.04);padding:14px 12px}
.sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sp-head h4{font-size:13px;font-weight:600}
.sp-sec{margin-bottom:10px}
.sp-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.2);margin-bottom:5px}
.ck{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;line-height:1.4}
.ck:last-of-type{border:none}
.ck-box{width:22px;height:22px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;cursor:pointer}
.ck-box.on{background:var(--ok);border-color:var(--ok);color:#fff}
.ck-box:active{transform:scale(0.9)}
.ck-txt{flex:1}.ck-txt.on{text-decoration:line-through;color:rgba(255,255,255,0.2)}
.ck-del{background:none;border:none;color:rgba(255,255,255,0.12);font-size:12px;padding:4px;min-height:28px;min-width:28px;display:flex;align-items:center;justify-content:center}
.ck-del:active{color:var(--err)}
.ck-add{display:flex;gap:6px;margin-top:6px}
.ck-add input{flex:1;font-size:14px;padding:8px}
.ck-add button{flex-shrink:0;min-width:44px;min-height:38px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-size:16px}
.sp-notes{width:100%;min-height:50px;font-size:13px;line-height:1.6;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:10px;resize:vertical;color:rgba(255,255,255,0.6)}
.sp-notes:focus{border-color:var(--pri)}
.lk{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px}
.lk a{color:#818cf8;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lk-add{display:flex;gap:6px;margin-top:6px}
.lk-add input{flex:1;font-size:14px;padding:8px}
.lk-add button{flex-shrink:0;min-width:44px;min-height:38px;background:rgba(255,255,255,0.06);color:var(--t2);border:1px solid var(--border);border-radius:8px;font-size:14px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;justify-content:center;align-items:flex-end;overflow:hidden}
.modal-bg.open{display:flex}
.modal{background:#111120;border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:16px;margin-bottom:2px}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--t2);font-size:20px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.modal-btns{display:flex;gap:8px;margin-top:16px}.modal-btns .btn{flex:1;min-height:44px}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;min-height:44px}
.btn-pri{background:var(--pri);color:#fff}.btn-danger{background:var(--err);color:#fff}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--t2)}
.btn-add{background:var(--pri);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;min-height:38px}
.row2{display:flex;gap:8px}.row2>*{flex:1}
.ms-list{margin-top:8px}.ms-item{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}.ms-item:last-child{border:none}.ms-item .ms-name{flex:1}
.ms-del{background:none;border:none;color:var(--t2);font-size:14px;padding:4px 8px;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center}.ms-del:active{color:var(--err)}
/* STEG TAB */
.steg-flow{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.steg-flow .arr{color:var(--t2);font-size:12px}.steg-flow .sf{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;white-space:nowrap}
.steg-cats{display:grid;grid-template-columns:1fr;gap:8px}
.steg-cat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.steg-cat h3{font-size:12px;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.steg-cat h3::after{content:'▾';color:var(--t2);font-size:10px}.steg-cat.collapsed .steg-body{display:none}.steg-cat.collapsed h3::after{content:'▸'}
.steg-item{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:12px;line-height:1.5}.steg-item:last-child{border:none}
.steg-item strong{display:block;font-size:13px}.steg-item .desc{color:var(--t2);font-size:11px}.steg-item .when{color:#818cf8;font-size:10px;margin-top:2px}.steg-item .modes{margin-top:3px}
.mode-tag{font-size:10px;background:rgba(99,102,241,0.08);color:#818cf8;padding:2px 6px;border-radius:4px;display:inline-block;margin:1px}
.search-input{max-width:100%;margin-bottom:10px;font-size:16px}
.legend{display:flex;gap:8px;font-size:10px;color:var(--t2);margin-bottom:10px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:3px}.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200}
.toast{padding:10px 18px;border-radius:10px;font-size:13px;color:#fff;margin-bottom:6px;animation:tin .2s;text-align:center;white-space:nowrap}.toast.ok{background:#065f46}.toast.err{background:#7f1d1d}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.data-bar{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);justify-content:center;flex-wrap:wrap}
.data-bar button{font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--t2);min-height:36px}.data-bar button:active{color:var(--t1);border-color:var(--t1)}
@media(min-width:700px){.content{padding:16px 20px}.prow-top{padding:10px 16px}.prow-info{min-width:180px}.tl-s{padding:2px 16px 6px}.steg-cats{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}.modal-bg{align-items:center}.modal{border-radius:var(--r);animation:none;max-height:85vh}.dot{width:22px;height:22px}.ln{width:22px}.ins-btn{width:22px;height:22px;font-size:13px}}
</style>
</head>
<body>
<div class="header"><h1>KM<span>Kommandocentral</span></h1><div class="stats" id="stats"></div></div>
<div class="tabs">
  <button class="tab-btn active" data-t="biz">🏢 Företag</button>
  <button class="tab-btn" data-t="pers">👤 Personligt</button>
  <button class="tab-btn" data-t="priv">🧘 Privat</button>
  <button class="tab-btn" data-t="steg">📖 Steg</button>
</div>
<div class="content">
<div class="tp active" id="p-biz"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div>Klar</div><div class="legend-item"><div class="legend-dot" style="background:var(--pri)"></div>Pågår</div><div class="legend-item">🔬 Research</div></div><button class="btn-add" onclick="openPM()">+ Projekt</button></div><div id="biz-list"></div></div>
<div class="tp" id="p-pers"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div>Klar</div><div class="legend-item"><div class="legend-dot" style="background:var(--pri)"></div>Pågår</div></div><button class="btn-add" onclick="openPM(null,'personal')">+ Personligt</button></div><div id="pers-list"></div></div>
<div class="tp" id="p-priv"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>+</div><div class="legend-item"><div class="legend-dot" style="background:var(--lila)"></div>++</div><div class="legend-item"><div class="legend-dot" style="background:var(--gul)"></div>+++</div></div><button class="btn-add" onclick="openPrivM()">+ Nytt</button></div><div id="priv-list"></div></div>
<div class="tp" id="p-steg"><input class="search-input" id="steg-search" placeholder="Sök steg..." oninput="renderSteg()"><div class="steg-flow" id="steg-flow"></div><div class="steg-cats" id="steg-list"></div></div>
</div>
<div class="data-bar"><button onclick="expD()">📥 Export</button><button onclick="document.getElementById('impF').click()">📤 Import</button><input type="file" id="impF" accept=".json" style="display:none" onchange="impD(event)"><button onclick="clrD()">🗑️ Rensa</button></div>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()"><div class="modal" id="mc"></div></div>
<div class="toast-wrap" id="toasts"></div>
<script>
const SK='km_cmd7';function gid(){return Math.random().toString(36).slice(2,8)}
// ═══ MS TEMPLATES ═══
const MS_T={planering:[{l:'Idé-validering',i:'💡',r:1},{l:'Research',i:'🔬',r:1},{l:'Konkurrenter',i:'🕵️',r:1},{l:'Design',i:'🎨',r:1},{l:'Affärsmodell',i:'💰',r:1},{l:'Tech-val',i:'⚙️',r:0},{l:'Redo',i:'✅',r:0}],bygger:[{l:'Research',i:'🔬',r:1},{l:'Design',i:'🎨',r:1},{l:'Bygg',i:'🔨',r:0},{l:'Mer Features',i:'⚙️',r:1},{l:'QA',i:'🔍',r:0},{l:'Polish',i:'✨',r:0},{l:'Juridik',i:'⚖️',r:0},{l:'SEO',i:'🔎',r:1},{l:'Launch',i:'🚀',r:0},{l:'Growth',i:'📈',r:1}],aktiv:[{l:'SEO',i:'🔎',r:1},{l:'Content',i:'✍️',r:1},{l:'Marknad',i:'📣',r:1},{l:'Ads',i:'📢',r:1},{l:'Automation',i:'🤖',r:0},{l:'Optimering',i:'🔧',r:1},{l:'Skalning',i:'📈',r:1}],parkerad:[]};

function isPers(p){return p.type==='Personlig App'||p.type==='Personligt'}
const DEF_P=[
  {id:gid(),name:'TS',type:'Företag Stort',status:'bygger',prio:3,version:'V0.1',milestones:mkMS('bygger')},{id:gid(),name:'DamSmycken',type:'Företag Stort',status:'bygger',prio:3,version:'V0.1',milestones:mkMS('bygger')},{id:gid(),name:'Nexioo',type:'Företag Stort',status:'planering',prio:2,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'ApexForm',type:'Företag Stort',status:'planering',prio:2,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'Byyt',type:'Företag Litet',status:'aktiv',prio:1,version:'V1.0',milestones:mkMS('aktiv')},{id:gid(),name:'Flyg Billig',type:'Företag Litet',status:'planering',prio:1,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'SFX',type:'Företag Litet',status:'planering',prio:1,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'Flyyt',type:'Företag Stort',status:'parkerad',prio:0,version:'V0.1',milestones:mkMS('bygger')},{id:gid(),name:'Oze Shoppen',type:'Företag Litet',status:'parkerad',prio:0,version:'V0.1',milestones:mkMS('bygger')},{id:gid(),name:'Potensshoppen',type:'Företag Litet',status:'parkerad',prio:0,version:'V0.1',milestones:mkMS('bygger')},{id:gid(),name:'Superapp',type:'Personlig App',status:'planering',prio:2,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'GYM 3',type:'Personlig App',status:'planering',prio:1,version:'V0.1',milestones:mkMS('planering')},{id:gid(),name:'Dashboard Företag',type:'Personlig App',status:'planering',prio:1,version:'V0.1',milestones:mkMS('planering')}];
function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d?.projects)return d}catch(e){}return{projects:DEF_P,personal:[]}}
function saveLocal(){localStorage.setItem(SK,JSON.stringify(D))}
let D=load();if(!D.personal)D.personal=[];
// ═══ SUPABASE ═══

    <div class="modal-btns">${p?`<button class="btn btn-danger" onclick="delPriv('${p.id}')">Ta bort</button><button class="btn btn-ghost" onclick="archPriv('${p.id}')">📦 Arkivera</button>`:''}<button class="btn btn-ghost" onclick="closeM()">Avbryt</button><button class="btn btn-pri" onclick="savePriv('${id||''}')">${p?'Spara':'Skapa'}</button></div>`)}
function rmPrivMS(pid,mid){const p=D.personal.find(x=>x.id===pid);if(!p||p.milestones.length<=1)return;p.milestones=p.milestones.filter(m=>m.id!==mid);save();openPrivM(pid)}
function savePriv(id){const n=document.getElementById('pv-n').value.trim();if(!n)return toast('Namn','err');
  if(id){const p=D.personal.find(x=>x.id===id);if(p){p.name=n;p.category=document.getElementById('pv-cat').value;p.tier=+document.getElementById('pv-tier').value;p.deadline=document.getElementById('pv-dl').value;p.budget=+document.getElementById('pv-bud').value||0;p.spent=+document.getElementById('pv-spe').value||0}}
  else D.personal.push({id:gid(),name:n,category:document.getElementById('pv-cat').value,tier:+document.getElementById('pv-tier').value,deadline:document.getElementById('pv-dl').value,budget:+document.getElementById('pv-bud').value||0,spent:+document.getElementById('pv-spe').value||0,archived:false,milestones:[{id:gid(),label:'Start',status:'active',deadline:'',checklist:[],notes:'',links:[]}]});
  save();closeM();renderAll();toast(id?'Sparat ✅':'Skapat ✅')}
function delPriv(id){if(!confirm('Ta bort?'))return;D.personal=D.personal.filter(p=>p.id!==id);save();closeM();renderAll();toast('Borttaget')}
function archPriv(id){const p=D.personal.find(x=>x.id===id);if(p){p.archived=true;xProj=null;xStep=null}save();closeM();renderAll();toast('Arkiverat 📦')}
function unarchPriv(id){const p=D.personal.find(x=>x.id===id);if(p)p.archived=false;save();renderAll();toast('Återställt ↩')}

:'Karriär',icon:'🎯',desc:'Intervju-prep.',when:'Jobb'},{n:'20',name:'Juridik',icon:'⚖️',desc:'GDPR, policy.',when:'Före launch'}]},{cat:'🚁 Överblick',items:[{n:'21',name:'Helikopter',icon:'🚁',desc:'Alla projekt, prio.',when:'Mån + fre'},{n:'22',name:'Handover',icon:'📄',desc:'Dokumenterar allt.',when:'V1.0'}]},{cat:'🔬 Research',items:[{n:'R1',name:'Strategi',icon:'🔬',desc:'Validera, konkurrenter.',when:'Innan bygg',modes:['/projekt','/konkurrent','/pris','/tech','/trend','/all']},{n:'R2',name:'Marknad',icon:'📡',desc:'Vem köper, var.',when:'Målgrupp',modes:['/målgrupp','/kanal','/seo','/ads','/social','/all']},{n:'R3',name:'Design & Kod',icon:'🎨',desc:'UI, UX, libraries.',when:'Design/kod',modes:['/ui','/ux','/kod','/compliance','/all']},{n:'R4',name:'Tillväxt',icon:'🚀',desc:'Growth, retention.',when:'Post-launch'},{n:'R5',name:'Personlig',icon:'🧠',desc:'Produktivitet.',when:'Personligt'}]}];

function renderSteg(){const q=(document.getElementById('steg-search')?.value||'').toLowerCase();document.getElementById('steg-flow').innerHTML=FLOW.map(s=>s==='→'?'<span class="arr">→</span>':`<span class="sf">${s}</span>`).join('');let h='';STEG.forEach(cat=>{const f=cat.items.filter(i=>!q||(i.name+i.desc+i.when+(i.modes||[]).join('')).toLowerCase().includes(q));if(!f.length)return;h+=`<div class="steg-cat"><h3 onclick="this.parentElement.classList.toggle('collapsed')">${cat.cat}</h3><div class="steg-body">`;f.forEach(i=>{h+=`<div class="steg-item"><strong>${i.icon} ${i.n!=='—'?'Steg '+i.n+': ':''}${i.name}</strong><div class="desc">${i.desc}</div><div class="when">📌 ${i.when}</div>${i.modes?`<div class="modes">${i.modes.map(m=>`<span class="mode-tag">${m}</span>`).join('')}</div>`:''}</div>`});h+='</div></div>'});document.getElementById('steg-list').innerHTML=h}

function expD(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='km-data.json';a.click();toast('Exporterad ✅')}
function impD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{D=JSON.parse(ev.target.result);if(!D.personal)D.personal=[];save();renderAll();toast('Importerad ✅')}catch(err){toast('Fel','err')}};r.readAsText(f);e.target.value=''}
function clrD(){if(!confirm('Rensa ALL data?'))return;localStorage.removeItem(SK);D={projects:DEF_P.map(p=>({...p,id:gid(),milestones:p.milestones.map(m=>({...m,id:gid()}))})),personal:[]};save();renderAll();toast('Rensat')}
function renderAll(){renderStats();renderProjList('biz-list',isBiz);renderProjList('pers-list',isPers);renderPrivat();renderSteg()}
renderAll();
