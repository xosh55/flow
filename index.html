<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KM Kommandocentral</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--pri:#6366f1;--ok:#10B981;--warn:#F59E0B;--err:#EF4444;--t1:#f1f5f9;--t2:rgba(255,255,255,0.4);--r:10px}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;font-size:14px;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--t1);border-radius:8px;padding:10px 12px;width:100%;outline:none;font-size:16px}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
select option{background:#14142a;color:var(--t1)}
label{display:block;color:var(--t2);font-size:12px;margin:10px 0 4px}
::-webkit-scrollbar{height:0;width:0}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--t2);font-weight:400;font-size:11px;margin-left:5px}
.stats{display:flex;gap:10px;font-size:11px;color:var(--t2)}
.stats b{color:var(--t1)}

/* TABS - bottom on mobile */
.tabs{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:var(--bg)}
.tab-btn{background:none;border:none;color:var(--t2);padding:8px 18px;border-radius:20px;font-size:13px;transition:.15s;white-space:nowrap;min-height:38px}
.tab-btn.active{background:var(--pri);color:#fff}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.04)}

.content{padding:12px 12px 20px;max-width:1400px;margin:0 auto}
.tp{display:none}.tp.active{display:block}

.b{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-block;white-space:nowrap}
.b-type{background:rgba(99,102,241,0.1);color:#a5b4fc}

/* GROUP HEADERS */
.grp{margin-bottom:16px}
.grp-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;padding:6px 0;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.grp-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grp-title .cnt{font-size:10px;color:var(--t2);background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:6px}

/* PROJECT ROW */
.prow{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.prow-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.prow-info{min-width:0;flex-shrink:0}
.prow-info h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px}
.prow-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.prio-dots{display:flex;gap:2px}
.prio-dots i{width:6px;height:6px;border-radius:50%;background:var(--pri);display:block}
.prio-dots i.off{opacity:.12}
.edit-btn{background:none;border:none;color:var(--t2);font-size:11px;padding:4px 6px;border-radius:4px;min-height:28px;min-width:28px;display:flex;align-items:center;justify-content:center}
.edit-btn:hover,.edit-btn:active{color:var(--t1);background:rgba(255,255,255,0.06)}
.ver{font-size:11px;color:var(--t2)}
.prog-text{font-size:10px;color:var(--t2)}

/* TIMELINE - horizontal scroll */
.tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;padding:2px 12px 10px;scroll-padding:12px}
.tl{display:flex;align-items:flex-start;min-width:max-content;gap:0;padding-right:12px}
.tl-step{display:flex;flex-direction:column;align-items:center;scroll-snap-align:start}
.tl-node{display:flex;align-items:center}
.tl-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;transition:.15s;z-index:2;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tl-dot:active{transform:scale(0.9)}
.tl-dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.tl-dot.active{background:var(--pri);border-color:var(--pri);box-shadow:0 0 10px rgba(99,102,241,0.4);animation:pulse 2s infinite;color:#fff}
.tl-dot.upcoming{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.02)}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(99,102,241,0.3)}50%{box-shadow:0 0 14px rgba(99,102,241,0.5)}}
.tl-line{width:20px;height:2px;background:rgba(255,255,255,0.06);flex-shrink:0}
.tl-line.done-line{background:var(--ok)}
.tl-line.active-line{background:linear-gradient(90deg,var(--ok),var(--pri))}
.tl-lbl{font-size:9px;color:var(--t2);margin-top:3px;text-align:center;white-space:nowrap}
.tl-lbl.done{color:rgba(16,185,129,0.6)}
.tl-lbl.active{color:var(--pri);font-weight:600}
.tl-res{height:14px;font-size:10px;display:flex;align-items:center;justify-content:center;margin-top:1px}

/* LEGEND */
.legend{display:flex;gap:10px;font-size:10px;color:var(--t2);margin-bottom:10px;flex-wrap:wrap;align-items:center;padding:0 2px}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}

/* STEG TAB */
.steg-flow{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.steg-flow .arr{color:var(--t2);font-size:12px}
.steg-flow .sf{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;white-space:nowrap}
.steg-cats{display:grid;grid-template-columns:1fr;gap:8px}
.steg-cat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.steg-cat h3{font-size:12px;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.steg-cat h3::after{content:'▾';color:var(--t2);font-size:10px}
.steg-cat.collapsed .steg-body{display:none}
.steg-cat.collapsed h3::after{content:'▸'}
.steg-item{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:12px;line-height:1.5}
.steg-item:last-child{border:none}
.steg-item strong{display:block;font-size:13px}
.steg-item .desc{color:var(--t2);font-size:11px;margin-top:1px}
.steg-item .when{color:#818cf8;font-size:10px;margin-top:3px}
.steg-item .modes{margin-top:4px}
.mode-tag{font-size:10px;background:rgba(99,102,241,0.08);color:#818cf8;padding:2px 7px;border-radius:4px;display:inline-block;margin:2px 1px}
.search-input{max-width:100%;margin-bottom:10px;font-size:16px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;justify-content:center;align-items:flex-end;overflow:hidden}
.modal-bg.open{display:flex}
.modal{background:#111120;border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:16px;margin-bottom:2px}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--t2);font-size:20px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--t1)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;min-height:44px}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;min-height:44px}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover,.btn-pri:active{opacity:.9}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--t2)}.btn-ghost:hover,.btn-ghost:active{border-color:var(--t1);color:var(--t1)}
.btn-danger{background:var(--err);color:#fff}
.btn-add{background:var(--pri);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;min-height:38px}
.row2{display:flex;gap:8px}.row2>*{flex:1}

.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200}
.toast{padding:10px 18px;border-radius:10px;font-size:13px;color:#fff;margin-bottom:6px;animation:tin .2s;text-align:center;white-space:nowrap}
.toast.ok{background:#065f46}.toast.err{background:#7f1d1d}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.data-bar{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);justify-content:center;flex-wrap:wrap}
.data-bar button{font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--t2);min-height:36px}
.data-bar button:active{color:var(--t1);border-color:var(--t1)}

/* Desktop tweaks */
@media(min-width:700px){
  .content{padding:16px 20px}
  .prow-top{padding:10px 16px}
  .tl-scroll{padding:2px 16px 10px}
  .prow-info{min-width:180px}
  .steg-cats{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
  .modal-bg{align-items:center}
  .modal{border-radius:var(--r);animation:none}
  .tl-dot{width:22px;height:22px}
  .tl-line{width:26px}
}
@media(min-width:1000px){
  .tl-dot{width:20px;height:20px;font-size:9px}
  .tl-line{width:30px}
}
</style>
</head>
<body>
<div class="header">
  <h1>KM<span>Kommandocentral</span></h1>
  <div class="stats" id="stats"></div>
</div>
<div class="tabs">
  <button class="tab-btn active" data-t="cmd">🚁 Översikt</button>
  <button class="tab-btn" data-t="steg">📖 Steg & Prompter</button>
</div>
<div class="content">
<div class="tp active" id="p-cmd">
  <div class="top-bar">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div>Klar</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pri);box-shadow:0 0 4px rgba(99,102,241,0.4)"></div>Pågår</div>
      <div class="legend-item"><div class="legend-dot" style="border:2px solid rgba(255,255,255,0.1);width:6px;height:6px"></div>Kommande</div>
      <div class="legend-item">🔬 Research</div>
    </div>
    <button class="btn-add" onclick="openPM()">+ Projekt</button>
  </div>
  <div id="proj-list"></div>
</div>
<div class="tp" id="p-steg">
  <input class="search-input" id="steg-search" placeholder="Sök steg eller prompt..." oninput="renderSteg()">
  <div style="font-size:12px;font-weight:600;margin-bottom:6px">Arbetsflöde</div>
  <div class="steg-flow" id="steg-flow"></div>
  <div class="steg-cats" id="steg-list"></div>
</div>
</div>
<div class="data-bar">
  <button onclick="expD()">📥 Export</button>
  <button onclick="document.getElementById('impF').click()">📤 Import</button>
  <input type="file" id="impF" accept=".json" style="display:none" onchange="impD(event)">
  <button onclick="clrD()">🗑️ Rensa</button>
</div>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()"><div class="modal" id="mc"></div></div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SK='km_cmd4';
function gid(){return Math.random().toString(36).slice(2,8)}

const DEF_MS=[
  {label:'Research',icon:'🔬',research:true},
  {label:'Design',icon:'🎨',research:true},
  {label:'Grund',icon:'🔨',research:false},
  {label:'Features',icon:'⚙️',research:true},
  {label:'QA',icon:'🔍',research:false},
  {label:'Polish',icon:'✨',research:false},
  {label:'Juridik',icon:'⚖️',research:false},
  {label:'Launch',icon:'🚀',research:false},
  {label:'Marknad',icon:'📣',research:true},
  {label:'SEO',icon:'🔎',research:true},
  {label:'Growth',icon:'📈',research:true}
];

function makeMS(preset){
  return DEF_MS.map((m,i)=>({
    id:gid(),label:m.label,icon:m.icon,research:m.research,
    status:preset==='live'?(i<=7?'done':i===8?'active':'upcoming'):'upcoming'
  }));
}

const DEF_P=[
  {id:gid(),name:'TS',type:'Företag Stort',status:'bygger',prio:3,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'DamSmycken',type:'Företag Stort',status:'bygger',prio:3,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Nexioo',type:'Företag Stort',status:'planering',prio:2,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'ApexForm',type:'Företag Stort',status:'planering',prio:2,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Byyt',type:'Företag Litet',status:'aktiv',prio:1,version:'V1.0',milestones:makeMS('live')},
  {id:gid(),name:'Flyg Billig',type:'Företag Litet',status:'planering',prio:1,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'SFX',type:'Företag Litet',status:'planering',prio:1,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Flyyt',type:'Företag Stort',status:'parkerad',prio:0,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Oze Shoppen',type:'Företag Litet',status:'parkerad',prio:0,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Potensshoppen',type:'Företag Litet',status:'parkerad',prio:0,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Superapp',type:'Personlig App',status:'planering',prio:2,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'GYM 3',type:'Personlig App',status:'planering',prio:1,version:'V0.1',milestones:makeMS('fresh')},
  {id:gid(),name:'Dashboard Företag',type:'Personlig App',status:'planering',prio:1,version:'V0.1',milestones:makeMS('fresh')},
];

function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d?.projects?.[0]?.milestones)return d}catch(e){}return{projects:DEF_P}}
function save(){localStorage.setItem(SK,JSON.stringify(D))}
let D=load();

function toast(m,t='ok'){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.getElementById('toasts').appendChild(d);setTimeout(()=>d.remove(),2200)}

document.querySelector('.tabs').onclick=e=>{const b=e.target.closest('.tab-btn');if(!b)return;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tp').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('p-'+b.dataset.t).classList.add('active')};

function openM(h){document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden'}
function closeM(){document.getElementById('modal').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});

const ST_CFG={
  aktiv:{label:'AKTIV',color:'#10B981',desc:'Live & tillväxt'},
  bygger:{label:'BYGGER',color:'#F59E0B',desc:'Aktiv kodning'},
  planering:{label:'PLANERING',color:'#6366f1',desc:'Research & design'},
  parkerad:{label:'PARKERAD',color:'rgba(255,255,255,0.25)',desc:'Pausad'}
};
const ST_ORD=['aktiv','bygger','planering','parkerad'];

function renderStats(){
  const c={};ST_ORD.forEach(s=>c[s]=0);
  D.projects.forEach(p=>c[p.status]=(c[p.status]||0)+1);
  const td=D.projects.reduce((s,p)=>s+p.milestones.filter(m=>m.status==='done').length,0);
  const ta=D.projects.reduce((s,p)=>s+p.milestones.length,0);
  document.getElementById('stats').innerHTML=`<span><b>${c.aktiv+c.bygger}</b> aktiva</span><span><b>${td}</b>/<b>${ta}</b> steg</span>`;
}

function renderProjects(){
  const el=document.getElementById('proj-list');
  let h='';
  ST_ORD.forEach(sk=>{
    const cfg=ST_CFG[sk];
    const items=D.projects.filter(p=>p.status===sk).sort((a,b)=>b.prio-a.prio);
    if(!items.length)return;
    h+=`<div class="grp"><div class="grp-title"><div class="dot" style="background:${cfg.color}"></div><span style="color:${cfg.color}">${cfg.label}</span><span class="cnt">${items.length}</span><span style="color:var(--t2);font-size:10px;text-transform:none;letter-spacing:0">${cfg.desc}</span></div>`;

    items.forEach(p=>{
      const done=p.milestones.filter(m=>m.status==='done').length;
      const total=p.milestones.length;
      let dots='';for(let i=0;i<3;i++)dots+=`<i class="${i<p.prio?'':'off'}"></i>`;
      const activeM=p.milestones.find(m=>m.status==='active');

      h+=`<div class="prow">
        <div class="prow-top">
          <div class="prow-info">
            <h3>${p.name}<button class="edit-btn" onclick="openPM('${p.id}')" aria-label="Redigera">✏️</button></h3>
            <div class="prow-meta">
              <span class="b b-type">${p.type}</span>
              <div class="prio-dots">${dots}</div>
              <span class="ver">${p.version}</span>
              <span class="prog-text">${done}/${total}</span>
            </div>
          </div>
        </div>
        <div class="tl-scroll">
          <div class="tl">`;

      p.milestones.forEach((m,i)=>{
        let lineCls='';
        if(i>0){
          const prev=p.milestones[i-1];
          if(prev.status==='done'&&m.status==='done')lineCls='done-line';
          else if(prev.status==='done'&&m.status==='active')lineCls='active-line';
        }
        const needsRes=m.research&&m.status!=='done';

        h+=`<div class="tl-step">
          <div class="tl-node">
            ${i>0?`<div class="tl-line ${lineCls}"></div>`:''}
            <div class="tl-dot ${m.status}" onclick="cycleMS('${p.id}',${i})" aria-label="${m.label}: ${m.status}">
              ${m.status==='done'?'✓':m.status==='active'?'►':''}
            </div>
          </div>
          <div class="tl-lbl ${m.status}">${m.label}</div>
          <div class="tl-res">${needsRes?'🔬':''}</div>
        </div>`;
      });

      h+=`</div></div></div>`;
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function cycleMS(pid,idx){
  const p=D.projects.find(x=>x.id===pid);if(!p)return;
  const m=p.milestones[idx];
  const c={upcoming:'active',active:'done',done:'upcoming'};
  m.status=c[m.status]||'upcoming';
  save();renderAll();
}

function openPM(id){
  const p=id?D.projects.find(x=>x.id===id):null;
  const sv=v=>p&&p.status===v?'selected':'';
  const tv=v=>p&&p.type===v?'selected':'';
  openM(`<button class="modal-close" onclick="closeM()">✕</button>
    <h2>${p?'Redigera':'Nytt'} projekt</h2>
    <label>Namn</label><input id="f-n" value="${p?p.name:''}">
    <div class="row2">
      <div><label>Typ</label><select id="f-t"><option ${tv('Företag Stort')}>Företag Stort</option><option ${tv('Företag Litet')}>Företag Litet</option><option ${tv('Personlig App')}>Personlig App</option><option ${tv('Personligt')}>Personligt</option></select></div>
      <div><label>Status</label><select id="f-s"><option value="aktiv" ${sv('aktiv')}>🟢 Aktiv</option><option value="bygger" ${sv('bygger')}>🟠 Bygger</option><option value="planering" ${sv('planering')}>🟣 Planering</option><option value="parkerad" ${sv('parkerad')}>⚪ Parkerad</option></select></div>
    </div>
    <div class="row2">
      <div><label>Prioritet (0-3)</label><input type="number" id="f-p" min="0" max="3" value="${p?p.prio:2}" inputmode="numeric"></div>
      <div><label>Version</label><input id="f-v" value="${p?p.version:'V0.1'}"></div>
    </div>
    <div class="modal-btns">
      ${p?`<button class="btn btn-danger" onclick="delP('${p.id}')">Ta bort</button>`:''}
      <button class="btn btn-ghost" onclick="closeM()">Avbryt</button>
      <button class="btn btn-pri" onclick="saveP('${id||''}')">Spara</button>
    </div>`);
}

function saveP(id){
  const n=document.getElementById('f-n').value.trim();
  if(!n){toast('Namn saknas','err');return}
  if(id){
    const p=D.projects.find(x=>x.id===id);
    if(p){p.name=n;p.type=document.getElementById('f-t').value;p.status=document.getElementById('f-s').value;p.prio=+document.getElementById('f-p').value||0;p.version=document.getElementById('f-v').value}
  }else{
    D.projects.push({id:gid(),name:n,type:document.getElementById('f-t').value,status:document.getElementById('f-s').value,prio:+document.getElementById('f-p').value||0,version:document.getElementById('f-v').value,milestones:makeMS('fresh')});
  }
  save();closeM();renderAll();toast(id?'Uppdaterat ✅':'Tillagt ✅');
}

function delP(id){if(!confirm('Ta bort projektet?'))return;D.projects=D.projects.filter(p=>p.id!==id);save();closeM();renderAll();toast('Borttaget')}

const FLOW=['💡 Idé','→','🔬 Research','→','🚀 Skapa','→','🔨 Bygg','→','🔍 QA','→','✨ Polish','→','⚖️ Juridik','→','🚀 Launch','→','📈 Tillväxt'];

function renderSteg(){
  const q=(document.getElementById('steg-search')?.value||'').toLowerCase();
  document.getElementById('steg-flow').innerHTML=FLOW.map(s=>s==='→'?'<span class="arr">→</span>':`<span class="sf">${s}</span>`).join('');
  let h='';
  STEG.forEach(cat=>{
    const f=cat.items.filter(i=>!q||(i.name+i.desc+i.when+(i.modes||[]).join('')).toLowerCase().includes(q));
    if(!f.length)return;
    h+=`<div class="steg-cat"><h3 onclick="this.parentElement.classList.toggle('collapsed')">${cat.cat}</h3><div class="steg-body">`;
    f.forEach(i=>{
      h+=`<div class="steg-item">
        <strong>${i.icon} ${i.n!=='—'?'Steg '+i.n+': ':''}${i.name}</strong>
        <div class="desc">${i.desc}</div>
        <div class="when">📌 ${i.when}</div>
        ${i.modes?`<div class="modes">${i.modes.map(m=>`<span class="mode-tag">${m}</span>`).join('')}</div>`:''}
      </div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('steg-list').innerHTML=h;
}
